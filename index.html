<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Bản đồ 11 tỉnh</title>

    <link
      rel="stylesheet"
      href="https://js.arcgis.com/4.29/esri/themes/light/main.css"
    />
    <script src="https://js.arcgis.com/4.29/"></script>

    <style>
      html,
      body,
      #viewDiv {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      .edit-panel {
        min-width: 260px;
        max-width: 320px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #c8d4df;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(10, 32, 56, 0.15);
        padding: 12px;
        font-family: "Segoe UI", sans-serif;
        color: #1f2f3d;
      }

      .edit-panel h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .edit-panel p {
        margin: 0 0 8px;
        font-size: 12px;
        line-height: 1.4;
      }

      .edit-panel select,
      .edit-panel button {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #b9c5d0;
        font-size: 13px;
      }

      .edit-panel button {
        cursor: pointer;
        border: 0;
        background: #0b74de;
        color: #fff;
        font-weight: 600;
      }

      .edit-panel button.secondary {
        background: #566573;
      }

      .edit-panel .status {
        margin-top: 6px;
        font-size: 12px;
        color: #30485d;
      }
    </style>
  </head>

  <body>
    <div id="viewDiv"></div>

    <script>
      require([
        "esri/Map",
        "esri/views/MapView",
        "esri/layers/GeoJSONLayer",
        "esri/layers/GraphicsLayer",
        "esri/Graphic",
        "esri/widgets/Sketch",
        "esri/geometry/support/webMercatorUtils",
      ], function (Map, MapView, GeoJSONLayer, GraphicsLayer, Graphic, Sketch, webMercatorUtils) {
        function createLayer(url) {
          return new GeoJSONLayer({
            url: url,

            renderer: {
              type: "simple",
              symbol: {
                type: "simple-fill",
                color: [0, 150, 255, 0.3],
                outline: {
                  color: [0, 0, 0],
                  width: 1,
                },
              },
            },

            popupTemplate: {
              title: "{ten_tinh}",
              content: `
                <b>Tên tỉnh:</b> {ten_tinh}<br>
                <b>Sáp nhập:</b> {sap_nhap}<br>
                <b>Diện tích:</b> {dien_tich} {don_vi_dien_tich}<br>
                <b>Dân số:</b> {dan_so}
                `,
            },
          });
        }

        function createHighwayLayer(url, color) {
          const layer = new GeoJSONLayer({
            url: encodeURI(url),
            outFields: ["*"],
            title: "Duong bo",
            renderer: {
              type: "simple",
              symbol: {
                type: "simple-line",
                color: color,
                width: 2.5,
              },
            },
            popupTemplate: {
              title: "Duong bo",
              content: `
                <b>Tên:</b> Khong ro<br>
                <b>Chiều dài (Km):</b> Khong ro<br>
                <b>Chiều rộng (m):</b> Khong ro<br>
                <b>Các tỉnh đi qua:</b> Khong co du lieu
              `,
            },
          });

          fetch(encodeURI(url))
            .then((response) => {
              if (!response.ok) {
                throw new Error(`Khong tai duoc file highway: ${url}`);
              }
              return response.json();
            })
            .then((geojson) => {
              const props = geojson?.features?.[0]?.properties || {};
              const ten = props.ten || "Duong bo";
              const chieuDai = props.chieu_dai_km ?? "Khong ro";
              const chieuRong = props.chieu_rong_m ?? "Khong ro";
              const cacTinhDiQua = Array.isArray(props.cac_tinh_di_qua)
                ? props.cac_tinh_di_qua.join(", ")
                : props.cac_tinh_di_qua || "Khong co du lieu";

              layer.title = ten;
              layer.popupTemplate = {
                title: ten,
                content: `
                  <b>Tên:</b> ${ten}<br>
                  <b>Chiều dài (Km):</b> ${chieuDai}<br>
                  <b>Chiều rộng (m):</b> ${chieuRong}<br>
                  <b>Các tỉnh đi qua:</b> ${cacTinhDiQua}
                `,
              };
            })
            .catch((error) => {
              console.error("Khong the nap metadata highway:", error);
            });

          return layer;
        }

        const layers = [
          createLayer("data/province/an_giang.geojson"),
          createLayer("data/province/ca_mau.geojson"),
          createLayer("data/province/can_tho.geojson"),
          createLayer("data/province/dak_lak.geojson"),
          createLayer("data/province/dong_nai.geojson"),
          createLayer("data/province/dong_thap.geojson"),
          createLayer("data/province/khanh_hoa.geojson"),
          createLayer("data/province/lam_dong.geojson"),
          createLayer("data/province/tay_ninh.geojson"),
          createLayer("data/province/tp_hcm.geojson"),
          createLayer("data/province/vinh_long.geojson"),
        ];

        const highwayConfigs = [
          {
            url: "data/highway/ben_luc_long_thanh.geojson",
            color: [230, 57, 70, 0.95],
          },
          {
            url: "data/highway/quoc_lo_13.geojson",
            color: [29, 78, 216, 0.95],
          },
          {
            url: "data/highway/tphcm_long_thanh_dau_giay.geojson",
            color: [46, 196, 182, 0.95],
          },
          {
            url: "data/highway/my_thuan_can_tho.geojson",
            color: [76, 201, 240, 0.95],
          },
          {
            url: "data/highway/tphcm_trung_luong.geojson",
            color: [128, 237, 153, 0.95],
          },
          {
            url: "data/highway/trung_luong_my_thuan.geojson",
            color: [249, 199, 79, 0.95],
          },
          {
            url: "data/highway/duong_tinh_654c_song_cau_yang_bay.geojson",
            color: [0, 121, 107, 0.95],
          },
          { url: "data/highway/quoc_lo_1k.geojson", color: [249, 132, 74, 0.95] },
          { url: "data/highway/quoc_lo_56.geojson", color: [185, 65, 212, 0.95] },
          { url: "data/highway/quoc_lo_61.geojson", color: [109, 76, 65, 0.95] },
          { url: "data/highway/quoc_lo_22.geojson", color: [0, 172, 193, 0.95] },
          { url: "data/highway/quoc_lo_50.geojson", color: [131, 56, 236, 0.95] },
          { url: "data/highway/quoc_lo_51.geojson", color: [255, 0, 110, 0.95] },
          { url: "data/highway/quoc_lo_62.geojson", color: [52, 152, 219, 0.95] },
          { url: "data/highway/quoc_lo_n2.geojson", color: [45, 127, 249, 0.95] },
          { url: "data/highway/quoc_lo_20.geojson", color: [243, 156, 18, 0.95] },
          { url: "data/highway/quoc_lo_27.geojson", color: [35, 155, 86, 0.95] },
        ];

        const highwayEntries = highwayConfigs.map((item) => ({
          url: item.url,
          fileName: item.url.split("/").pop(),
          layer: createHighwayLayer(item.url, item.color),
        }));

        const highwayLayers = highwayEntries.map((item) => item.layer);

        const map = new Map({
          basemap: "topo-vector",
          layers: [...layers, ...highwayLayers],
        });

        const universityLayer = new GraphicsLayer({
          title: "Truong dai hoc",
        });
        map.add(universityLayer);

        const editableHighwayLayer = new GraphicsLayer({
          title: "Highway editable",
          listMode: "hide",
        });
        map.add(editableHighwayLayer);

        const view = new MapView({
          container: "viewDiv",
          map: map,
          center: [106.7, 10.5],
          zoom: 7,
        });

        const sketch = new Sketch({
          view: view,
          layer: editableHighwayLayer,
          visibleElements: {
            createTools: {
              point: false,
              polyline: false,
              polygon: false,
              rectangle: false,
              circle: false,
            },
            selectionTools: {
              lassoSelection: false,
              rectangleSelection: false,
            },
            settingsMenu: false,
          },
          updateOnGraphicClick: true,
        });

        sketch.viewModel.defaultUpdateOptions = {
          tool: "reshape",
          enableRotation: false,
          enableScaling: false,
          multipleSelectionEnabled: false,
        };

        view.ui.add(sketch, "top-right");

        const editPanel = document.createElement("div");
        editPanel.className = "edit-panel";
        editPanel.innerHTML = `
          <h3>Chinh sua duong bo</h3>
          <p>Chon 1 tuyen, sua dinh tren ban do, sau do export file GeoJSON de ghi de.</p>
          <select id="highwaySelect"></select>
          <button id="loadHighwayBtn">Nap de chinh sua</button>
          <button id="exportHighwayBtn" class="secondary">Export GeoJSON</button>
          <div id="editStatus" class="status">Chua nap tuyen nao de chinh sua.</div>
        `;
        view.ui.add(editPanel, "top-left");

        const highwaySelect = editPanel.querySelector("#highwaySelect");
        const loadHighwayBtn = editPanel.querySelector("#loadHighwayBtn");
        const exportHighwayBtn = editPanel.querySelector("#exportHighwayBtn");
        const editStatus = editPanel.querySelector("#editStatus");

        highwayEntries.forEach((item, index) => {
          const option = document.createElement("option");
          option.value = String(index);
          option.textContent = item.fileName;
          highwaySelect.appendChild(option);
        });

        let currentEditableFileName = "";
        let hasPendingEdits = false;

        function setStatus(message) {
          editStatus.textContent = message;
        }

        function normalizeProperties(attributes) {
          const props = { ...attributes };
          delete props.OBJECTID;
          delete props.ObjectID;
          delete props.FID;
          delete props.__OBJECTID;
          return props;
        }

        function toExportFileName(fileName) {
          const safeName = fileName || "edited_highway.geojson";
          const withoutExt = safeName.replace(/\.geojson$/i, "");
          if (withoutExt.endsWith("-origin")) {
            return `${withoutExt}.geojson`;
          }
          return `${withoutExt}-origin.geojson`;
        }

        function toGeoJSONName(fileName) {
          return fileName
            .replace(/\.geojson$/i, "")
            .replace(/-origin$/i, "");
        }

        function toLonLatPaths(geometry) {
          if (!geometry) {
            return [];
          }

          let sourceGeometry = geometry;
          if (geometry.spatialReference?.isWebMercator) {
            sourceGeometry = webMercatorUtils.webMercatorToGeographic(geometry);
          }

          return (sourceGeometry.paths || []).map((path) =>
            path.map((coord) => [coord[0], coord[1]])
          );
        }

        function polylineToGeoJSONGeometry(geometry) {
          const paths = toLonLatPaths(geometry);
          if (paths.length > 1) {
            return {
              type: "MultiLineString",
              coordinates: paths,
            };
          }
          return {
            type: "LineString",
            coordinates: paths[0] || [],
          };
        }

        function downloadGeoJSON(geojson, fileName) {
          const blob = new Blob([JSON.stringify(geojson, null, 2)], {
            type: "application/geo+json;charset=utf-8",
          });
          const objectUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = objectUrl;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(objectUrl);
        }

        async function loadHighwayForEditing() {
          const selectedIndex = Number(highwaySelect.value);
          const selectedEntry = highwayEntries[selectedIndex];
          if (!selectedEntry) {
            setStatus("Khong tim thay tuyen de nap.");
            return;
          }

          editableHighwayLayer.removeAll();
          sketch.cancel();

          highwayLayers.forEach((layer) => {
            layer.visible = true;
          });

          selectedEntry.layer.visible = false;

          try {
            const featureSet = await selectedEntry.layer.queryFeatures({
              where: "1=1",
              returnGeometry: true,
              outFields: ["*"],
            });

            if (!featureSet.features.length) {
              setStatus("Tuyen da chon khong co feature de chinh sua.");
              selectedEntry.layer.visible = true;
              return;
            }

            const editGraphics = featureSet.features.map(
              (feature) =>
                new Graphic({
                  geometry: feature.geometry.clone(),
                  attributes: normalizeProperties(feature.attributes || {}),
                  symbol: {
                    type: "simple-line",
                    color: [255, 80, 0, 1],
                    width: 4,
                  },
                })
            );

            editableHighwayLayer.addMany(editGraphics);

            currentEditableFileName = selectedEntry.fileName || "edited_highway.geojson";
            hasPendingEdits = false;
            setStatus(
              `Da nap ${currentEditableFileName}. Dung widget ben phai de click vao duong va reshape.`
            );

            if (editGraphics.length === 1) {
              sketch.update(editGraphics[0], {
                tool: "reshape",
                enableRotation: false,
                enableScaling: false,
              });
            }
          } catch (error) {
            selectedEntry.layer.visible = true;
            console.error("Khong the nap tuyen de chinh sua:", error);
            setStatus("Loi khi nap du lieu. Kiem tra console de biet chi tiet.");
          }
        }

        function exportEditedHighway() {
          if (!currentEditableFileName || editableHighwayLayer.graphics.length === 0) {
            setStatus("Chua co duong nao duoc nap de export.");
            return;
          }

          if (!hasPendingEdits) {
            setStatus("Ban chua thay doi hinh hoc. Van co the export neu can.");
          }

          const features = editableHighwayLayer.graphics
            .toArray()
            .filter((graphic) => graphic.geometry?.type === "polyline")
            .map((graphic) => {
              const geometry = polylineToGeoJSONGeometry(graphic.geometry);
              const properties = normalizeProperties(graphic.attributes || {});
              properties.toa_do_duong_polyline = geometry.coordinates;

              return {
                type: "Feature",
                properties: properties,
                geometry: geometry,
              };
            });

          if (!features.length) {
            setStatus("Khong co geometry hop le de export.");
            return;
          }

          const exportFileName = toExportFileName(currentEditableFileName);
          const geojsonName = toGeoJSONName(exportFileName);

          const geojson = {
            type: "FeatureCollection",
            name: geojsonName,
            crs: {
              type: "name",
              properties: {
                name: "urn:ogc:def:crs:OGC:1.3:CRS84",
              },
            },
            features: features,
          };

          downloadGeoJSON(geojson, exportFileName);
          hasPendingEdits = false;
          setStatus(
            `Da export ${exportFileName}. Thay file trong data/highway roi reload trang.`
          );
        }

        loadHighwayBtn.addEventListener("click", loadHighwayForEditing);
        exportHighwayBtn.addEventListener("click", exportEditedHighway);

        sketch.on("update", (event) => {
          if (event.state === "complete") {
            hasPendingEdits = true;
            setStatus("Da cap nhat hinh hoc. Bam Export GeoJSON de luu file.");
          }
        });

        sketch.on("delete", () => {
          hasPendingEdits = true;
          setStatus("Da xoa mot feature. Bam Export GeoJSON de cap nhat file.");
        });

        const imageCache = new globalThis.Map();

        function toAbsoluteUniversityImgPath(relativeImgPath) {
          // data.js stores image path relative to data/university.
          return `data/university/${relativeImgPath.replace(/^\.\//, "")}`;
        }

        function guessMimeType(base64) {
          if (base64.startsWith("iVBORw0KGgo")) {
            return "image/png";
          }
          if (base64.startsWith("/9j/")) {
            return "image/jpeg";
          }
          if (base64.startsWith("R0lGOD")) {
            return "image/gif";
          }
          if (base64.startsWith("PHN2Zy")) {
            return "image/svg+xml";
          }
          return "image/png";
        }

        function wrapImageInCircleSvg(base64, mimeType) {
          const rawImageUrl = `data:${mimeType};base64,${base64}`;
          const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
              <defs>
                <clipPath id="clip-circle">
                  <circle cx="32" cy="32" r="26" />
                </clipPath>
              </defs>
              <circle cx="32" cy="32" r="30" fill="#ffffff" stroke="#0b4f6c" stroke-width="4" />
              <image href="${rawImageUrl}" x="6" y="6" width="52" height="52" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-circle)" />
            </svg>
          `;
          return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
        }

        async function getImageDataUrl(imgJsonPath) {
          if (imageCache.has(imgJsonPath)) {
            return imageCache.get(imgJsonPath);
          }

          const response = await fetch(imgJsonPath);
          if (!response.ok) {
            throw new Error(`Khong tai duoc icon: ${imgJsonPath}`);
          }

          const { base64 } = await response.json();
          if (!base64) {
            throw new Error(`File icon khong co truong base64: ${imgJsonPath}`);
          }

          const mimeType = guessMimeType(base64);
          const dataUrl = wrapImageInCircleSvg(base64, mimeType);
          imageCache.set(imgJsonPath, dataUrl);
          return dataUrl;
        }

        async function addUniversityMarkers() {
          const module = await import("./data/university/data.js");
          const universities = module.default || [];

          const graphics = await Promise.all(
            universities.map(async (item) => {
              const imgPath = toAbsoluteUniversityImgPath(item.img);
              const iconDataUrl = await getImageDataUrl(imgPath);

              return new Graphic({
                geometry: {
                  type: "point",
                  longitude: item.long,
                  latitude: item.lat,
                },
                symbol: {
                  type: "picture-marker",
                  url: iconDataUrl,
                  width: "24px",
                  height: "24px",
                },
                attributes: {
                  truong: item.truong,
                  namThanhLap: item.namThanhLap,
                  chuyenNganh: item.chuyenNganh,
                  soLuong: item.soLuong,
                },
                popupTemplate: {
                  title: "{truong}",
                  content: `
                    <b>Nam thanh lap:</b> {namThanhLap}<br>
                    <b>Chuyen nganh:</b> {chuyenNganh}<br>
                    <b>So luong SV:</b> {soLuong}
                  `,
                },
              });
            })
          );

          universityLayer.addMany(graphics);
        }

        addUniversityMarkers().catch((error) => {
          console.error("Khong the tao marker truong dai hoc:", error);
        });
      });
    </script>
  </body>
</html>
